limit_req_zone $binary_remote_addr zone=mai_search:10m rate=12r/m;

log_format tarko_timed '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                       'rt=$request_time urt=$upstream_response_time host=$host gzip=$gzip_ratio';

server {
    server_name mai.tarko.su;
    limit_conn perip 20;

    root /var/www/mai-tarko;
    index index.html;

    access_log /var/log/nginx/mai-tarko.access.log tarko_timed;
    error_log /var/log/nginx/mai-tarko.error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/mai-tarko;
    }

    location = /api { return 308 /api/; }

    location = /api/search {
        limit_req zone=mai_search burst=8 nodelay;
        proxy_pass http://127.0.0.1:8013/api/search;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8013/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|json|png|jpg|jpeg|gif|svg|ico|ttf|otf)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
